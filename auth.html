<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CareerLab — Вход и регистрация</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@300;400;500;600&family=Unbounded:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="careerlab-ui.css">
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--bg, #f0f0e8);
    }
    .auth-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 5rem 1rem 3rem;
    }
    .auth-card {
      background: #fff;
      border-radius: 22px;
      padding: 2.5rem 2.25rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.07);
    }
    .auth-logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 800;
      font-size: 1.05rem;
      margin-bottom: 2rem;
      text-decoration: none;
      color: var(--ink, #1e2114);
    }
    .auth-logo-mark {
      width: 1.8rem;
      height: 1.8rem;
      display: inline-grid;
      place-items: center;
      border-radius: 0.5rem;
      background: var(--lime, #c9f135);
      font-size: 0.78rem;
      font-weight: 900;
    }
    .auth-tabs {
      display: flex;
      gap: 0;
      border-bottom: 2px solid #e8e8ef;
      margin-bottom: 1.75rem;
    }
    .auth-tab {
      flex: 1;
      padding: 0.6rem 0;
      text-align: center;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      color: var(--muted, #7a7d70);
      border-bottom: 2.5px solid transparent;
      margin-bottom: -2px;
      transition: color 0.15s, border-color 0.15s;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
    }
    .auth-tab.active {
      color: var(--ink, #1e2114);
      border-bottom-color: var(--ink, #1e2114);
    }
    .auth-form { display: none; }
    .auth-form.active { display: block; }
    .auth-field {
      margin-bottom: 1rem;
    }
    .auth-label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--muted, #7a7d70);
      margin-bottom: 0.35rem;
    }
    .auth-input {
      width: 100%;
      padding: 0.7rem 0.95rem;
      border: 1.5px solid #e0e0e8;
      border-radius: 10px;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
      box-sizing: border-box;
      background: #fafafa;
    }
    .auth-input:focus { border-color: #b0b3a8; background: #fff; }
    .auth-btn {
      width: 100%;
      padding: 0.8rem;
      background: var(--ink, #1e2114);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 0.5rem;
      font-family: inherit;
      transition: opacity 0.15s;
    }
    .auth-btn:disabled { opacity: 0.55; cursor: not-allowed; }
    .auth-btn:hover:not(:disabled) { opacity: 0.85; }
    .auth-msg {
      font-size: 0.85rem;
      margin-top: 0.9rem;
      padding: 0.65rem 0.9rem;
      border-radius: 8px;
      display: none;
    }
    .auth-msg.error { background: #fff0ee; color: #c0392b; display: block; }
    .auth-msg.success { background: #f0f9cc; color: #3a5a00; display: block; }
    .auth-divider {
      text-align: center;
      font-size: 0.82rem;
      color: var(--muted, #7a7d70);
      margin: 1.1rem 0 0.9rem;
    }
    .auth-google-btn {
      width: 100%;
      padding: 0.75rem;
      background: #fff;
      color: var(--ink, #1e2114);
      border: 1.5px solid #e0e0e8;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      transition: background 0.15s;
    }
    .auth-google-btn:hover { background: #f5f5f5; }
    .auth-hint {
      font-size: 0.8rem;
      color: var(--muted, #7a7d70);
      text-align: center;
      margin-top: 1.25rem;
    }
    .auth-hint a { color: var(--ink, #1e2114); font-weight: 600; }
  </style>
</head>
<body class="careerlab-site auth-page">

  <header class="topbar">
    <div class="container nav-wrap">
      <a href="index.html" class="logo"><span class="logo-mark">C</span>CareerLab</a>
      <nav class="nav">
        <a href="index.html">Главная</a>
        <a href="vacancies.html">Вакансии</a>
        <a href="knowledge-base.html">База знаний</a>
        <a href="research.html">Исследования</a>
      </nav>
    </div>
  </header>

  <div class="auth-wrap">
    <div class="auth-card">
      <a href="index.html" class="auth-logo">
        <span class="auth-logo-mark">C</span>CareerLab
      </a>

      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Войти</button>
        <button class="auth-tab" data-tab="register">Регистрация</button>
      </div>

      <!-- Форма входа -->
      <div class="auth-form active" id="form-login">
        <div class="auth-field">
          <label class="auth-label" for="login-email">Email</label>
          <input class="auth-input" id="login-email" type="email" placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="auth-field">
          <label class="auth-label" for="login-password">Пароль</label>
          <input class="auth-input" id="login-password" type="password" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button class="auth-btn" id="login-btn">Войти</button>
        <div class="auth-divider">или</div>
        <button class="auth-google-btn" id="login-google-btn">
          <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 6.293C4.672 4.166 6.656 3.58 9 3.58z"/></svg>
          Войти через Google
        </button>
        <div class="auth-msg" id="login-msg"></div>
      </div>

      <!-- Форма регистрации -->
      <div class="auth-form" id="form-register">
        <div class="auth-field">
          <label class="auth-label" for="reg-name">Имя</label>
          <input class="auth-input" id="reg-name" type="text" placeholder="Иван Иванов" autocomplete="name">
        </div>
        <div class="auth-field">
          <label class="auth-label" for="reg-email">Email</label>
          <input class="auth-input" id="reg-email" type="email" placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="auth-field">
          <label class="auth-label" for="reg-password">Пароль <span style="color:#b0b3a8;font-weight:400">(минимум 6 символов)</span></label>
          <input class="auth-input" id="reg-password" type="password" placeholder="••••••••" autocomplete="new-password">
        </div>
        <button class="auth-btn" id="reg-btn">Зарегистрироваться</button>
        <div class="auth-divider">или</div>
        <button class="auth-google-btn" id="reg-google-btn">
          <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 6.293C4.672 4.166 6.656 3.58 9 3.58z"/></svg>
          Зарегистрироваться через Google
        </button>
        <div class="auth-msg" id="reg-msg"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    const SUPABASE_URL = "https://tetukoylasquueg.beget.app";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlIiwiaWF0IjoxNzc2NjQzMjAwLCJleHAiOjE5MzQ0MDk2MDB9.5XEDypOTMio-_M7UcHZnocTFN65ckAwLhzvyS_qF7pA";
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Если уже залогинен — сразу в кабинет
    sb.auth.getSession().then(({ data: { session } }) => {
      if (session) {
        const params = new URLSearchParams(window.location.search);
        window.location.href = params.get("next") || "office.html";
      }
    });

    // Переключение вкладок
    document.querySelectorAll(".auth-tab").forEach(tab => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".auth-tab").forEach(t => t.classList.remove("active"));
        document.querySelectorAll(".auth-form").forEach(f => f.classList.remove("active"));
        tab.classList.add("active");
        document.getElementById("form-" + tab.dataset.tab).classList.add("active");
      });
    });

    function showMsg(id, text, type) {
      const el = document.getElementById(id);
      el.textContent = text;
      el.className = "auth-msg " + type;
    }

    // Вход по email/паролю
    document.getElementById("login-btn").addEventListener("click", async () => {
      const btn = document.getElementById("login-btn");
      const email = document.getElementById("login-email").value.trim();
      const password = document.getElementById("login-password").value;
      if (!email || !password) return showMsg("login-msg", "Введите email и пароль.", "error");
      btn.disabled = true; btn.textContent = "Входим…";
      const { error } = await sb.auth.signInWithPassword({ email, password });
      if (error) {
        showMsg("login-msg", translateError(error.message), "error");
        btn.disabled = false; btn.textContent = "Войти";
      } else {
        const params = new URLSearchParams(window.location.search);
        window.location.href = params.get("next") || "office.html";
      }
    });

    // Регистрация
    document.getElementById("reg-btn").addEventListener("click", async () => {
      const btn = document.getElementById("reg-btn");
      const name = document.getElementById("reg-name").value.trim();
      const email = document.getElementById("reg-email").value.trim();
      const password = document.getElementById("reg-password").value;
      if (!name || !email || !password) return showMsg("reg-msg", "Заполните все поля.", "error");
      if (password.length < 6) return showMsg("reg-msg", "Пароль должен быть не менее 6 символов.", "error");
      btn.disabled = true; btn.textContent = "Регистрируем…";
      const { error } = await sb.auth.signUp({
        email, password,
        options: { data: { full_name: name } }
      });
      if (error) {
        showMsg("reg-msg", translateError(error.message), "error");
        btn.disabled = false; btn.textContent = "Зарегистрироваться";
      } else {
        showMsg("reg-msg", "Аккаунт создан! Проверьте почту для подтверждения, затем войдите.", "success");
        btn.disabled = false; btn.textContent = "Зарегистрироваться";
      }
    });

    // Google OAuth
    async function signInWithGoogle() {
      await sb.auth.signInWithOAuth({
        provider: "google",
        options: { redirectTo: window.location.origin + "/office.html" }
      });
    }
    document.getElementById("login-google-btn").addEventListener("click", signInWithGoogle);
    document.getElementById("reg-google-btn").addEventListener("click", signInWithGoogle);

    // Нажатие Enter
    document.addEventListener("keydown", e => {
      if (e.key !== "Enter") return;
      const loginActive = document.getElementById("form-login").classList.contains("active");
      if (loginActive) document.getElementById("login-btn").click();
      else document.getElementById("reg-btn").click();
    });

    function translateError(msg) {
      if (msg.includes("Invalid login credentials")) return "Неверный email или пароль.";
      if (msg.includes("Email not confirmed")) return "Подтвердите email перед входом.";
      if (msg.includes("User already registered")) return "Этот email уже зарегистрирован. Войдите.";
      if (msg.includes("Password should be")) return "Пароль слишком короткий (минимум 6 символов).";
      return msg;
    }
  </script>
</body>
</html>
