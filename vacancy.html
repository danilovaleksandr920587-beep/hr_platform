<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CareerLab — описание вакансии</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@300;400;500;600&family=Unbounded:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="careerlab-ui.css">
</head>
<body class="careerlab-site">
  <header class="topbar">
    <div class="container nav-wrap">
      <a href="index.html" class="logo"><span class="logo-mark">C</span>CareerLab</a>
      <nav class="nav">
        <a href="index.html">Главная</a>
        <a href="vacancies.html" class="active-link">Вакансии</a>
        <a href="knowledge-base.html">База знаний</a>
        <a href="research.html">Исследования</a>
        <a href="office.html">Личный кабинет</a>
      </nav>
      <a class="btn btn-dark" href="office.html">В кабинет</a>
    </div>
  </header>

  <main>
    <section class="section">
      <div class="container">
        <article class="panel">
          <a class="text-link" href="vacancies.html">← К списку вакансий</a>
          <h1 class="page-title" id="vacancy-title" style="margin-top: 0.4rem;">Вакансия</h1>
          <p class="hero-text" id="vacancy-company">Компания</p>
          <p class="vacancy-card-pay" id="vacancy-pay">Зарплата не указана</p>
          <div class="chips chips-spaced" id="vacancy-chips"></div>
          <p id="vacancy-description" class="muted"></p>
          <div class="hero-actions">
            <a class="btn btn-coral" href="office.html">Откликнуться</a>
            <a class="btn btn-light" href="vacancies.html">Вернуться к поиску</a>
          </div>
        </article>
      </div>
    </section>
  </main>

  <footer class="footer section">
    <div class="container footer-wrap">
      <p>CareerLab, 2026</p>
      <div class="footer-links">
        <a href="index.html">О платформе</a>
        <a href="knowledge-base.html">Вопросы и ответы</a>
        <a href="office.html">Контакты</a>
        <a href="research.html">Как мы считаем данные</a>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    (function () {
      var SUPABASE_URL = "https://qrxcfawhhycdhbhgqwdk.supabase.co";
      var SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFyeGNmYXdoaHljZGhiaGdxd2RrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MjA2MDYsImV4cCI6MjA5MjA5NjYwNn0.2ydIH5_h9xgheTC476BfxK89GDK6V-mW9OnIKhj_SnM";
      var createClient = window.supabase && window.supabase.createClient;
      if (!createClient) return;
      var sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      var EXP_LABEL = { none: "Без опыта", lt1: "До 1 года", "1-3": "1–3 года", gte3: "От 3 лет" };
      var FORMAT_LABEL = { remote: "Удалённо", hybrid: "Гибрид", office: "Офис" };
      var TYPE_LABEL = { internship: "Стажировка", project: "Проект", parttime: "Подработка" };

      var params = new URLSearchParams(window.location.search);
      var slug = params.get("slug") || params.get("id");

      function payLabel(row) {
        if (row.salary_min != null && row.salary_max != null) {
          return (
            row.salary_min.toLocaleString("ru-RU") +
            " — " +
            row.salary_max.toLocaleString("ru-RU") +
            " ₽"
          );
        }
        return "Не указана";
      }

      async function load() {
        if (!slug) {
          document.getElementById("vacancy-title").textContent = "Вакансия не найдена";
          return;
        }
        var res = await sb.from("vacancies").select("*").eq("slug", slug).eq("is_published", true).maybeSingle();
        if (res.error || !res.data) {
          document.getElementById("vacancy-title").textContent = "Вакансия не найдена";
          return;
        }
        var row = res.data;
        document.getElementById("vacancy-title").textContent = row.title;
        document.getElementById("vacancy-company").textContent = row.company;
        document.getElementById("vacancy-pay").textContent = payLabel(row);
        document.getElementById("vacancy-description").textContent = row.description;
        document.title = row.title + " — CareerLab";

        var chipsEl = document.getElementById("vacancy-chips");
        chipsEl.innerHTML = "";
        function addChip(text) {
          var span = document.createElement("span");
          span.className = "chip";
          span.textContent = text;
          chipsEl.appendChild(span);
        }
        addChip(EXP_LABEL[row.exp] || row.exp);
        if (/junior/i.test(row.title)) addChip("Junior");
        addChip(TYPE_LABEL[row.employment_type] || row.employment_type);
        addChip(FORMAT_LABEL[row.format] || row.format);
        (row.bonus_tags || []).forEach(function (b) {
          if (b === "mentor") addChip("Ментор");
          if (b === "paid-intern") addChip("Оплачиваемая стажировка");
          if (b === "edu-pay") addChip("Доплата за обучение");
        });
      }

      void load();
    })();
  </script>
</body>
</html>
